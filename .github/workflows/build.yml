name: Build Books

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      book:
        description: 'Book to build (directory name, or empty for changed books only)'
        required: false
        type: string

jobs:
  detect:
    name: Detect changed books
    runs-on: ubuntu-latest
    outputs:
      books: ${{ steps.find.outputs.books }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find books to build
        id: find
        run: |
          INFRA_DIRS="scripts templates node_modules .github .git"

          if [[ -n "${{ inputs.book }}" ]]; then
            # Manual trigger: build the specified book
            echo "books=[\"${{ inputs.book }}\"]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Auto-detect changed books from the latest commit
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git ls-files)
          BOOKS=()

          while IFS= read -r file; do
            # Get the top-level directory
            top_dir=$(echo "$file" | cut -d'/' -f1)
            [[ -z "$top_dir" ]] && continue

            # Skip infrastructure directories and root files
            skip=false
            for infra in $INFRA_DIRS; do
              [[ "$top_dir" == "$infra" ]] && skip=true && break
            done
            [[ "$skip" == true ]] && continue
            [[ ! -d "$top_dir" ]] && continue

            # Add to list if not already present
            found=false
            for b in "${BOOKS[@]+"${BOOKS[@]}"}"; do
              [[ "$b" == "$top_dir" ]] && found=true && break
            done
            [[ "$found" == false ]] && BOOKS+=("$top_dir")
          done <<< "$CHANGED_FILES"

          # Build JSON array
          if [[ ${#BOOKS[@]} -eq 0 ]]; then
            echo "books=[]" >> "$GITHUB_OUTPUT"
          else
            JSON="["
            first=true
            for b in "${BOOKS[@]}"; do
              [[ "$first" == true ]] && first=false || JSON+=","
              JSON+="\"$b\""
            done
            JSON+="]"
            echo "books=$JSON" >> "$GITHUB_OUTPUT"
          fi

          echo "Books to build: ${BOOKS[*]+"${BOOKS[*]}"}"

  build:
    name: "Build: ${{ matrix.book }}"
    needs: detect
    if: needs.detect.outputs.books != '[]'
    runs-on: ubuntu-latest
    container:
      image: pandoc/extra:latest
    strategy:
      matrix:
        book: ${{ fromJson(needs.detect.outputs.books) }}
    steps:
      - uses: actions/checkout@v4

      - name: Build PDF
        run: |
          chmod +x scripts/build.sh
          bash scripts/build.sh "${{ matrix.book }}" pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.book }}"
          path: "${{ matrix.book }}/.build/*.pdf"
          retention-days: 90

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
          BOOK: ${{ matrix.book }}
        run: |
          [[ -z "$DISCORD_WEBHOOK" ]] && echo "No Discord webhook configured, skipping." && exit 0

          if [[ "$STATUS" == "success" ]]; then
            COLOR=3066993
            EMOJI="📗"
          else
            COLOR=15158332
            EMOJI="❌"
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1 | sed 's/"/\\"/g')

          # Use printf to safely build JSON
          JSON=$(printf '{"embeds": [{"title": "%s %s — Build %s", "description": "**Commit:** %s\\n**Branch:** %s\\n\\n[Download PDF](%s)", "color": %d, "timestamp": "%s"}]}' \
            "$EMOJI" "$BOOK" "$STATUS" "$COMMIT_MSG" "${{ github.ref_name }}" "$RUN_URL" "$COLOR" "$(date -u +%Y-%m-%dT%H:%M:%SZ)")

          curl -sf -H "Content-Type: application/json" -d "$JSON" "$DISCORD_WEBHOOK" || echo "Discord notification failed"
